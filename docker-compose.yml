version: '3.8'

services:
  dolphin-ai:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: ["-m", "/models/dolphin-2.8-mistral-3b.Q4_K_M.gguf", "-c", "4096", "--host", "0.0.0.0"]
    environment:
      - MODEL_URL=${DOLPHIN_MODEL_URL}
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "5000:5000"
    depends_on:
      - dolphin-ai
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: unless-stopped